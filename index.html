<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- SEO Meta Tags -->
        <meta
            name="description"
            content="Vedyara Organic - Premium organic food products including pure honey, jaggery powder, millets, pulses and grains. 100% natural, farm-sourced, lab-tested. Buy on Amazon."
        />
        <meta
            name="keywords"
            content="organic honey, jaggery powder, millets, organic pulses, organic grains, farm fresh, natural food, vedyara organic, himalayan honey, foxtail millet, pearl millet, ragi, urad dal, masoor dal, brown rice"
        />
        <meta name="author" content="Vedyara Organic" />
        <meta name="robots" content="index, follow" />
        <meta name="theme-color" content="#3E2F1C" />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://vedyaraorganic.com/" />
        <meta
            property="og:title"
            content="Vedyara Organic — Pure. Natural. Trusted by Tradition."
        />
        <meta
            property="og:description"
            content="Premium organic food products sourced directly from farms. Honey, Jaggery, Millets, Pulses & Grains. No Chemicals. No Compromise."
        />
        <meta
            property="og:image"
            content="https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1200&q=80"
        />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta
            name="twitter:title"
            content="Vedyara Organic — Pure. Natural. Trusted by Tradition."
        />
        <meta
            name="twitter:description"
            content="Premium organic food products. Honey, Jaggery, Millets, Pulses & Grains. Buy on Amazon."
        />
        <meta
            name="twitter:image"
            content="https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1200&q=80"
        />

        <!-- Canonical URL -->
        <link rel="canonical" href="https://vedyaraorganic.com/" />

        <!-- Google Fonts: Playfair Display (serif headings) + Inter (body) -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600;1,700&family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <!-- Structured Data (JSON-LD) -->
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "Organization",
                "name": "Vedyara Organic",
                "url": "https://vedyaraorganic.com",
                "description": "Premium organic food brand offering honey, jaggery powder, millets, pulses and grains.",
                "sameAs": ["https://www.amazon.in/vedyara-organic"],
                "contactPoint": {
                    "@type": "ContactPoint",
                    "contactType": "customer service",
                    "availableLanguage": ["English", "Hindi"]
                }
            }
        </script>

        <title>Vedyara Organic — Pure. Natural. Trusted by Tradition.</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
