<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 230" width="420" height="230">
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </radialGradient>
    <linearGradient id="leafGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A7A28"/>
      <stop offset="100%" stop-color="#2E5010"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D6820"/>
      <stop offset="100%" stop-color="#264510"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════
       LOTUS LEAF CLUSTER  (centred at 210, 95)
  ═══════════════════════════════════════ -->

  <!-- Far-left leaf -->
  <ellipse cx="210" cy="95" rx="11" ry="34"
    fill="url(#leafGrad2)"
    transform="rotate(-62 210 95) translate(-52 4)"/>

  <!-- Mid-left leaf -->
  <ellipse cx="210" cy="95" rx="12" ry="36"
    fill="url(#leafGrad2)"
    transform="rotate(-38 210 95) translate(-28 0)"/>

  <!-- Inner-left leaf -->
  <ellipse cx="210" cy="95" rx="13" ry="38"
    fill="url(#leafGrad1)"
    transform="rotate(-18 210 95) translate(-12 -2)"/>

  <!-- Centre leaf (tallest) -->
  <ellipse cx="210" cy="80" rx="13" ry="42"
    fill="url(#leafGrad1)"/>

  <!-- Inner-right leaf -->
  <ellipse cx="210" cy="95" rx="13" ry="38"
    fill="url(#leafGrad1)"
    transform="rotate(18 210 95) translate(12 -2)"/>

  <!-- Mid-right leaf -->
  <ellipse cx="210" cy="95" rx="12" ry="36"
    fill="url(#leafGrad2)"
    transform="rotate(38 210 95) translate(28 0)"/>

  <!-- Far-right leaf -->
  <ellipse cx="210" cy="95" rx="11" ry="34"
    fill="url(#leafGrad2)"
    transform="rotate(62 210 95) translate(52 4)"/>

  <!-- ═══════════════════════════════════════
       GOLDEN SUN  (sits atop the centre leaf)
  ═══════════════════════════════════════ -->

  <!-- Sun disc -->
  <circle cx="210" cy="52" r="15" fill="url(#sunGrad)"/>

  <!-- Sun rays (8 lines) -->
  <g stroke="#C9A227" stroke-width="2.2" stroke-linecap="round">
    <line x1="210" y1="32"  x2="210" y2="24"/>
    <line x1="222" y1="36"  x2="228" y2="30"/>
    <line x1="228" y1="49"  x2="237" y2="47"/>
    <line x1="198" y1="36"  x2="192" y2="30"/>
    <line x1="192" y1="49"  x2="183" y2="47"/>
    <line x1="225" y1="62"  x2="232" y2="67"/>
    <line x1="195" y1="62"  x2="188" y2="67"/>
  </g>

  <!-- ═══════════════════════════════════════
       "Vedyara" — hand-drawn script style
       Built from SVG paths to stay font-independent
  ═══════════════════════════════════════ -->

  <text
    x="210" y="162"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="68"
    font-weight="bold"
    font-style="italic"
    fill="#2E5010"
    letter-spacing="2"
  >Vedyara</text>

  <!-- ═══════════════════════════════════════
       "ORGANIC" small-caps label
  ═══════════════════════════════════════ -->

  <text
    x="210" y="188"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="19"
    font-weight="600"
    fill="#2E5010"
    letter-spacing="7"
  >ORGANIC</text>

  <!-- Decorative gold lines flanking "ORGANIC" -->
  <line x1="62"  y1="181" x2="128" y2="181" stroke="#C9A227" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="292" y1="181" x2="358" y2="181" stroke="#C9A227" stroke-width="1.8" stroke-linecap="round"/>
</svg>
